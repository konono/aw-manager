apiVersion: v1
kind: ServiceAccount
metadata:
  name: aw-manager
  namespace: aw-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aw-manager
  namespace: aw
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aw-manager
  namespace: aw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aw-manager
subjects:
  - kind: ServiceAccount
    name: aw-manager
    namespace: aw-system
